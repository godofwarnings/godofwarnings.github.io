---
layout: default
title: Links
permalink: /links/
---
<div class="section-page-wrap">
  <header class="section-page-header">
    <h1 class="section-page-title">Links</h1>
    <p class="section-page-sub">Things I found worth reading. With some commentary.</p>
  </header>
  <div class="links-list">
    {% for link in site.links reversed %}
    <div class="link-entry">
      <div class="link-entry-meta">
        <span>{{ link.date | date: "%B %-d, %Y" }}</span>
        {% if link.via %}<span class="link-via">via {{ link.via }}</span>{% endif %}
      </div>
      <a class="link-title" href="{{ link.link_url }}" target="_blank" rel="noopener">
        {{ link.title }} ↗
      </a>
      <div class="link-body">{{ link.content }}</div>
    </div>
    {% endfor %}
  </div>
</div>
