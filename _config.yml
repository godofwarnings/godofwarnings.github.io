title: Radhikesh's Blog
description: Personal blog. Mostly notes to myself that occasionally make sense to others.
url: ""
baseurl: ""

theme: minima
minima:
  skin: auto
  date_format: "%B %-d, %Y"

author:
  name: Radhikesh Agrawal
  # bio: "CS undergrad at IIIT Hyderabad · ML research · writes code, breaks code, writes about it"
  github: godofwarnings
  linkedin: radhikeshagrawal
  avatar: /assets/images/pfp.jpg

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-paginate
  - jekyll-redirect-from
  - jekyll-sitemap

permalink: /:year/:month/:day/:title/

paginate: 10
paginate_path: "/page:num/"

sass:
  style: compressed
  quiet_deps: true
  silence_deprecations:
    - import
    - color-functions
    - global-builtin

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor/
  - node_modules/
  - README.md

currently:
  - emoji: "📖"
    text: "The Pragmatic Programmer"
  - emoji: "🎵"
    text: "Metallica on repeat"
  - emoji: "🔬"
    text: "HEP-JEPA interpretability"
  - emoji: "☕"
    text: "Too much chai"

collections:
  til:
    output: true
    permalink: /til/:name/
  links:
    output: false

category_groups:
  cs:    [Machine-Learning, High-Energy-Physics, Data-Structure-and-Algorithms, DSA, CPP, DevOps, Software-Engineering]
  math:  [Mathematics, Optimization, Game-Theory, Quant, Puzzles]
  psych: [Psychology, Neuroscience]
  linux: [Linux, Hardware, Configuration]