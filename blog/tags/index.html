---
layout: page
title: Tags
permalink: /blog/tags/
---
{% assign tags = site.tags | sort %}
{% for tag in tags %}
<h3>{{ tag[0] }} ({{ tag[1] | size }})</h3>
<ul>
  {% for post in tag[1] %}
  <li>
    <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
    <span>{{ post.date | date: "%b %-d, %Y" }}</span>
  </li>
  {% endfor %}
</ul>
{% endfor %}
