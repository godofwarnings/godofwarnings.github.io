---
layout: default
---
<div class="section-page-wrap">
  <header class="post-header" style="padding-top:32px">
    <a class="back-link" href="{{ '/til/' | relative_url }}">← back to TIL</a>
    <span class="post-header-cat-badge">TIL</span>
    <h1 class="post-header-title">{{ page.title }}</h1>
    <div class="post-header-meta">
      <span>{{ page.date | date: "%B %-d, %Y" }}</span>
    </div>
  </header>
  <div class="post-content">{{ content }}</div>
</div>
